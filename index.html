<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>来自董家才子的小问候 ✿</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="home-body">
  <div class="particle-bg" id="particleBg"></div>

  <div class="home-container">
    <h1 class="greeting">
      <span id="typingText"></span><span class="typing-cursor"></span>
    </h1>

    <div class="countdown-box">
      <p class="countdown-label" id="countdownLabel">距下班</p>
      <div class="countdown" id="countdown">--:--:--</div>
    </div>

    <div class="fun-quote" id="funQuote"></div>

    <nav class="card-nav">
      <a href="game.html" class="card card-game">
        <span class="card-icon">✈</span>
        <span class="card-title">摸鱼大作战</span>
        <span class="card-desc">击落老板派来的会议和DDL</span>
        <span class="card-tag tag-endless">无尽模式</span>
      </a>
      <a href="block.html" class="card card-block">
        <span class="card-icon">🧱</span>
        <span class="card-title">打砖块</span>
        <span class="card-desc">10关挑战，越来越难</span>
        <span class="card-tag tag-progression">10关通关</span>
      </a>
      <a href="type.html" class="card card-type">
        <span class="card-icon">⌨</span>
        <span class="card-title">打字大作战</span>
        <span class="card-desc">快速输入击落工作任务</span>
        <span class="card-tag tag-difficulty">难度可选</span>
      </a>
      <a href="memory.html" class="card card-memory">
        <span class="card-icon">🃏</span>
        <span class="card-title">记忆翻牌</span>
        <span class="card-desc">考验你的记忆力</span>
        <span class="card-tag tag-difficulty">难度可选</span>
      </a>
      <a href="2048.html" class="card card-2048">
        <span class="card-icon">🎯</span>
        <span class="card-title">2048</span>
        <span class="card-desc">经典数字合成，停不下来</span>
        <span class="card-tag tag-endless">无尽模式</span>
      </a>
      <a href="pet.html" class="card card-pet">
        <span class="card-icon">🐱</span>
        <span class="card-title">云养猫</span>
        <span class="card-desc">来撸一只赛博猫猫</span>
        <span class="card-tag tag-casual">休闲</span>
      </a>
      <a href="gallery.html" class="card card-gallery">
        <span class="card-icon">🖼</span>
        <span class="card-title">表情包库</span>
        <span class="card-desc">精选沙雕表情包自取</span>
        <span class="card-tag tag-casual">休闲</span>
      </a>
    </nav>

    <div class="streak-badge" id="streakBadge"></div>

    <footer class="home-footer">
      <p>made with <span class="heart">♥</span> by 董家才子</p>
      <p class="footer-hint">💡 试试按 ESC 键，或者输入上上下下左右左右BA</p>
    </footer>
  </div>

  <button class="achievement-panel-btn" onclick="toggleAchievementPanel()" title="查看成就">🏆</button>

  <div class="achievement-panel" id="achievementPanel">
    <button class="achievement-panel-close" onclick="toggleAchievementPanel()">✕</button>
    <div class="achievement-panel-content">
      <div class="achievement-panel-title">🏆 成就墙</div>
      <div class="achievement-grid" id="achievementGrid"></div>
    </div>
  </div>

  <script src="common.js"></script>
  <script>
    // Typing effect
    const fullText = '来自 董家才子 的小问候 ✿';
    const typingEl = document.getElementById('typingText');
    let charIdx = 0;
    function typeChar() {
      if (charIdx < fullText.length) {
        typingEl.textContent += fullText[charIdx];
        charIdx++;
        setTimeout(typeChar, 80 + Math.random() * 60);
      }
    }
    typeChar();

    // Particles
    const particleEmojis = ['🐟','✈','🧱','⌨','🃏','🎯','🐱','✨','💫','⭐','🌟'];
    const bg = document.getElementById('particleBg');
    for (let i = 0; i < 15; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.textContent = particleEmojis[Math.floor(Math.random() * particleEmojis.length)];
      p.style.left = Math.random() * 100 + '%';
      p.style.animationDuration = (15 + Math.random() * 20) + 's';
      p.style.animationDelay = -(Math.random() * 20) + 's';
      p.style.fontSize = (18 + Math.random() * 20) + 'px';
      bg.appendChild(p);
    }

    // Streak badge
    const stats = getStats();
    if (stats.streak && stats.streak > 1) {
      document.getElementById('streakBadge').innerHTML =
        `🔥 连续摸鱼 <strong>${stats.streak}</strong> 天`;
    }

    // Achievement panel
    function toggleAchievementPanel() {
      const panel = document.getElementById('achievementPanel');
      panel.classList.toggle('show');
      if (panel.classList.contains('show')) renderAchievements();
    }

    function renderAchievements() {
      const stats = getStats();
      const unlocked = stats.achievements || [];
      const grid = document.getElementById('achievementGrid');
      grid.innerHTML = '';
      Object.entries(ACHIEVEMENTS).forEach(([id, a]) => {
        const isUnlocked = unlocked.includes(id);
        const item = document.createElement('div');
        item.className = 'achievement-item' + (isUnlocked ? '' : ' locked');
        item.innerHTML = `
          <div class="achievement-item-icon">${isUnlocked ? a.icon : '🔒'}</div>
          <div class="achievement-item-title">${isUnlocked ? a.title : '???'}</div>
          <div class="achievement-item-desc">${a.desc}</div>
        `;
        grid.appendChild(item);
      });
    }

    // Random quote
    const quotes = [
      "今天的你，也在努力假装很忙呢 ✨",
      "摸鱼不是偷懒，是灵魂的喘息 🐟",
      "距离周末还有亿点点，先摸会鱼吧 🎣",
      "你不是在上班，你是在给梦想攒路费 💰",
      "今天也是被闹钟背叛的一天 ⏰",
      "别急，下班铃总会响的，就像希望一样 🔔",
      "打工是不可能打工的...啊不对，正在打工 🫠",
      "你的代码能跑，但你的灵魂在报错 👻",
      "生活不止眼前的bug，还有远方的摸鱼 🌈",
      "摸鱼一时爽，一直摸鱼一直爽 🐟",
      "你今天的工作量，取决于老板的视力 👓",
      "不是在开会，就是在去开会的路上 🚶",
      "代码千万行，摸鱼第一行 💻",
      "人生苦短，我选摸鱼 🎣",
      "别卷了，来玩个游戏吧 🎮",
    ];
    document.getElementById('funQuote').textContent =
      '「' + quotes[Math.floor(Math.random() * quotes.length)] + '」';

    // Countdown
    function updateCountdown() {
      const now = new Date();
      const day = now.getDay();
      const hour = now.getHours();
      const label = document.getElementById('countdownLabel');
      const el = document.getElementById('countdown');

      let target;
      if (day === 0 || day === 6) {
        label.textContent = '距周一上班';
        target = new Date(now);
        target.setDate(target.getDate() + (day === 0 ? 1 : 2));
        target.setHours(9, 0, 0, 0);
      } else if (hour >= 18) {
        label.textContent = '距明天上班';
        target = new Date(now);
        target.setDate(target.getDate() + 1);
        target.setHours(9, 0, 0, 0);
      } else if (hour < 9) {
        label.textContent = '距上班';
        target = new Date(now);
        target.setHours(9, 0, 0, 0);
      } else {
        label.textContent = '距下班';
        target = new Date(now);
        target.setHours(18, 0, 0, 0);
      }

      const diff = Math.max(0, target - now);
      const h = String(Math.floor(diff / 3600000)).padStart(2, '0');
      const m = String(Math.floor((diff % 3600000) / 60000)).padStart(2, '0');
      const s = String(Math.floor((diff % 60000) / 1000)).padStart(2, '0');
      el.textContent = `${h}:${m}:${s}`;
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);

    trackGamePlayed('index');
  </script>
</body>
</html>
