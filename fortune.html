  <footer class="page-footer">made with ♥ by 董家才子</footer>

  <script src="common.js"></script>
  <script>
    /* ── 基础工具 ── */
    function dateHash(date) {
      const str = date.toDateString();
      let hash = 0;
      for (let i = 0; i < str.length; i++) {
        hash = ((hash << 5) - hash) + str.charCodeAt(i);
        hash = hash & hash;
      }
      return Math.abs(hash);
    }

    function seededRandom(seed) {
      let s = seed;
      return function() {
        s = (s * 9301 + 49297) % 233280;
        return s / 233280;
      };
    }

    function generateStars(count) {
      return '★'.repeat(count) + '☆'.repeat(5 - count);
    }

    function shuffle(arr, rand) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(rand() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    /* ── 生肖系统 ── */
    const zodiacAnimals = [
      { name: '鼠', icon: '🐭', traits: '机智灵活，善于观察，是天生的摸鱼高手' },
      { name: '牛', icon: '🐮', traits: '勤劳踏实，偶尔摸鱼也能效率翻倍' },
      { name: '虎', icon: '🐯', traits: '勇猛果断，老板看了都害怕' },
      { name: '兔', icon: '🐰', traits: '温和机敏，跑路速度一流' },
      { name: '龙', icon: '🐲', traits: '气场强大，开会时自带隐身光环' },
      { name: '蛇', icon: '🐍', traits: '深藏不露，最会假装在忙' },
      { name: '马', icon: '🐴', traits: '精力充沛，摸鱼工作两不误' },
      { name: '羊', icon: '🐑', traits: '温顺善良，被发现了也会装无辜' },
      { name: '猴', icon: '🐵', traits: '聪明伶俐，什么游戏都能速通' },
      { name: '鸡', icon: '🐔', traits: '准时下班，绝不加班一秒' },
      { name: '狗', icon: '🐶', traits: '忠诚可靠，帮同事望风的最佳人选' },
      { name: '猪', icon: '🐷', traits: '乐天知命，摸鱼界的天花板' },
    ];

    const zodiacCompat = {
      '鼠': { best: ['龙','猴','牛'], clash: ['马','羊'] },
      '牛': { best: ['鼠','蛇','鸡'], clash: ['羊','马'] },
      '虎': { best: ['猪','马','狗'], clash: ['猴','蛇'] },
      '兔': { best: ['羊','猪','狗'], clash: ['鸡','龙'] },
      '龙': { best: ['鸡','鼠','猴'], clash: ['狗','兔'] },
      '蛇': { best: ['猴','鸡','牛'], clash: ['猪','虎'] },
      '马': { best: ['羊','虎','狗'], clash: ['鼠','牛'] },
      '羊': { best: ['马','兔','猪'], clash: ['牛','狗'] },
      '猴': { best: ['蛇','鼠','龙'], clash: ['虎','猪'] },
      '鸡': { best: ['龙','牛','蛇'], clash: ['兔','狗'] },
      '狗': { best: ['兔','虎','马'], clash: ['龙','鸡'] },
      '猪': { best: ['虎','兔','羊'], clash: ['蛇','猴'] },
    };

    function getZodiacAnimal(year) {
      return zodiacAnimals[(year - 4) % 12];
    }

    /* ── 运势等级 ── */
    const levelConfig = {
      5: { name: '大吉', color: '#ffd700', emoji: '🌟' },
      4: { name: '中吉', color: '#00d4aa', emoji: '✨' },
      3: { name: '小吉', color: '#66b3ff', emoji: '⭐' },
      2: { name: '平',   color: '#aaa',    emoji: '☁️' },
      1: { name: '小凶', color: '#f97316', emoji: '⚡' },
    };

    /* ── 运势文案（按星级分类） ── */
    const overallByScore = {
      5: ['运势爆棚！今天摸鱼之神附体，做什么都顺利', '大吉之日！老板今天特别慈祥，放心摸鱼', '百年难遇的好运！建议全天摸鱼'],
      4: ['运势不错，适合挑战新游戏和新玩法', '吉运当头，摸鱼效率高', '今天是个好日子，适合放松'],
      3: ['运势尚可，正常摸鱼没问题', '平平淡淡才是真，适度摸鱼', '运势一般，但也不差'],
      2: ['运势平平，建议低调行事', '今天适合安静摸鱼，别太张扬', '普普通通的一天，别搞事情'],
      1: ['运势低迷，小心老板突击检查', '不太适合高调摸鱼，建议假装很忙', '凶日！建议真的工作一会'],
    };

    const workByScore = {
      5: ['效率爆棚，1小时干完3小时的活', '老板今天对你印象极好', '适合主动汇报，展示成果'],
      4: ['工作顺利，bug 会自动消失', '代码一次过编译，零 warning', '产品经理今天不会来找你'],
      3: ['工作正常推进，无功无过', '开会时记得带笔记本假装记重点', '邮件会被正常回复'],
      2: ['工作有些繁琐，耐心处理', '小 bug 频出，但都能解决', '今天需求可能变更'],
      1: ['小心 deadline 逼近', '老板可能突然点名', '建议今天认真工作一会'],
    };

    const moyuByScore = {
      5: ['摸鱼运爆棚！安全系数 99%', '老板今天不在公司，放心大胆摸', '全天摸鱼无人发现，传说级'],
      4: ['摸鱼运极佳，建议玩 2048 或打砖块', '摸鱼大师就是你，无人能敌', '推荐全天摸鱼，运势极佳'],
      3: ['摸鱼运尚可，建议低调', '适合云养猫和看表情包', '正常摸鱼，注意观察周围'],
      2: ['摸鱼运一般，注意老板动向', '建议玩安静的游戏', '偶尔摸一下就好'],
      1: ['摸鱼危险！建议假装很忙', '小心同事举报，戴好耳机', '高危日！用伪装模式'],
    };

    const loveByScore = {
      5: ['桃花运爆棚！注意身边的人', '适合表白，成功率极高', '今天魅力值拉满'],
      4: ['桃花运不错，适合和 crush 聊天', '会有人主动找你搭话', '今天适合社交'],
      3: ['桃花运平平，不如先摸鱼', '单身也快乐，游戏更香', '适合暗恋不适合表白'],
      2: ['桃花运一般，建议专心工作', '不适合主动出击', '今天适合独处'],
      1: ['桃花运低迷，别在群里发骚', '小心说错话得罪人', '今天别表白了'],
    };

    const moneyByScore = {
      5: ['财运爆棚，适合做重要决定', '今天可能有意外收入', '贵人运极佳'],
      4: ['财运不错，可以犒劳自己', '适合投资自己（买书买课）', '今天适合理财'],
      3: ['财运平平，正常消费即可', '不亏就是赚', '今天不适合冲动消费'],
      2: ['财运一般，省着点花', '别点太贵的外卖', '今天不宜购物'],
      1: ['财运动荡，捂紧钱包', '千万别买彩票', '今天忌花钱'],
    };

    /* ── 黄历宜忌 ── */
    const yiPool = [
      '摸鱼', '写代码', '云养猫', '玩游戏', '喝茶',
      '打砖块', '玩 2048', '看表情包', '假装开会', '整理桌面',
      '打字练习', '听歌', '发呆', '吃零食', '刷视频',
      '逛论坛', '午睡', '跟同事聊天', '看电影', '运动',
    ];

    const jiPool = [
      '加班', '主动汇报', '开会', '跟老板对视', 'force push',
      '删库', '提交代码', '修 bug', '提需求', '回复邮件',
      '接电话', '站起来走动', '大声说话', '开屏幕共享', '发朋友圈',
      '迟到', '早退', '请假', '吃辣', '熬夜',
    ];

    /* ── 幸运物品库 ── */
    const colors =     ['红色 🔴','蓝色 🔵','绿色 🟢','黄色 🟡','紫色 🟣','橙色 🟠','粉色 🩷','白色 ⚪','黑色 ⚫','青色 🩵'];
    const directions = ['正东','正南','正西','正北','东南','东北','西南','西北'];
    const foods =      ['奶茶 🧋','咖啡 ☕','炸鸡 🍗','火锅 🍲','烧烤 🍖','寿司 🍣','披萨 🍕','水果沙拉 🥗','泡面 🍜','蛋糕 🍰','辣条 🌶️','薯条 🍟'];
    const games =      ['摸鱼大作战 ✈','打砖块 🧱','打字大作战 ⌨','2048 🎯','云养猫 🐱','表情包库 🖼','摸鱼影院 🎬'];
    const times =      ['子时 23-1点','丑时 1-3点','寅时 3-5点','卯时 5-7点','辰时 7-9点','巳时 9-11点','午时 11-13点','未时 13-15点','申时 15-17点','酉时 17-19点','戌时 19-21点','亥时 21-23点'];

    /* ── 综合建议 ── */
    const advices = [
      '今日摸鱼之道：眼观六路，耳听八方',
      '宜静不宜动，鼠标轻点即可',
      '今日适合多窗口切换，显得忙碌',
      '老板今日心情好，可以适当放松',
      '摸鱼最高境界：让老板以为你在加班',
      '今日宜低调，忌炫耀摸鱼成果',
      '适当摸鱼有助于提高工作效率（确信）',
      '今日适合组队摸鱼，互相掩护',
      '摸鱼虽好，可不要贪杯哦',
      '今天适合给自己泡杯好茶慢慢品',
    ];

    /* ── 生成今日运势 ── */
    const today = new Date();
    const year = today.getFullYear();
    const hash = dateHash(today);
    const rand = seededRandom(hash);

    // 生肖
    const zodiac = getZodiacAnimal(year);
    document.getElementById('zodiacAnimal').textContent = zodiac.icon;
    document.getElementById('zodiacName').textContent = '属' + zodiac.name + '年';
    document.getElementById('zodiacYear').textContent = year + '年';
    document.getElementById('zodiacDesc').textContent = zodiac.traits;

    // 日期
    const dateStr = today.toLocaleDateString('zh-CN', {
      year: 'numeric', month: 'long', day: 'numeric', weekday: 'long'
    });
    document.getElementById('dateDisplay').textContent = dateStr;

    // 各项运势 1-5
    const workScore  = Math.floor(rand() * 5) + 1;
    const moyuScore  = Math.floor(rand() * 5) + 1;
    const loveScore  = Math.floor(rand() * 5) + 1;
    const moneyScore = Math.floor(rand() * 5) + 1;
    const overall    = Math.round((workScore + moyuScore + loveScore + moneyScore) / 4);
    const level = levelConfig[overall];

    document.getElementById('overallLevel').textContent = level.emoji + ' ' + level.name;
    document.getElementById('overallLevel').style.color = level.color;
    document.getElementById('overallStars').textContent = generateStars(overall);
    document.getElementById('overallText').textContent = pickText(overallByScore[overall], rand);

    document.getElementById('workStars').textContent  = generateStars(workScore);
    document.getElementById('moyuStars').textContent  = generateStars(moyuScore);
    document.getElementById('loveStars').textContent  = generateStars(loveScore);
    document.getElementById('moneyStars').textContent = generateStars(moneyScore);

    document.getElementById('workTip').textContent  = pickText(workByScore[workScore], rand);
    document.getElementById('moyuTip').textContent  = pickText(moyuByScore[moyuScore], rand);
    document.getElementById('loveTip').textContent  = pickText(loveByScore[loveScore], rand);
    document.getElementById('moneyTip').textContent = pickText(moneyByScore[moneyScore], rand);

    function pickText(arr, r) {
      return arr[Math.floor(r() * arr.length)];
    }

    // 宜忌
    const yiList = shuffle(yiPool, rand).slice(0, 4);
    const jiList = shuffle(jiPool, rand).slice(0, 4);
    document.getElementById('yiList').innerHTML = yiList.map(i => '<span class="yi-tag">' + i + '</span>').join('');
    document.getElementById('jiList').innerHTML = jiList.map(i => '<span class="ji-tag">' + i + '</span>').join('');

    // 生肖相合
    const best = zodiacCompat[zodiac.name].best;
    document.getElementById('compatList').innerHTML = best.map(name => {
      const a = zodiacAnimals.find(z => z.name === name);
      return '<span class="compat-chip">' + a.icon + ' ' + a.name + '</span>';
    }).join('');

    // 幸运物品
    document.getElementById('luckyColor').textContent     = colors[Math.floor(rand() * colors.length)];
    document.getElementById('luckyNumber').textContent     = Math.floor(rand() * 99) + 1;
    document.getElementById('luckyDirection').textContent  = directions[Math.floor(rand() * directions.length)];
    document.getElementById('luckyFood').textContent       = foods[Math.floor(rand() * foods.length)];
    document.getElementById('luckyGame').textContent       = games[Math.floor(rand() * games.length)];
    document.getElementById('luckyTime').textContent       = times[Math.floor(rand() * times.length)];

    // 综合建议
    const advice = advices[Math.floor(rand() * advices.length)];
    document.getElementById('advice').innerHTML = '💡 ' + advice;

    trackGamePlayed('fortune');
  </script>
</body>
</html>
