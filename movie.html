<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>摸鱼影院 🎬</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="page-body movie-body">
  <header class="page-header">
    <div class="page-title"><span class="page-title-icon">🎬</span>摸鱼影院</div>
    <a href="./" class="back-link">← 回首页</a>
  </header>

  <div class="movie-container">
    <div class="movie-player" id="moviePlayer">
      <video id="videoPlayer" controls preload="metadata">
        您的浏览器不支持视频播放
      </video>
      <div class="movie-placeholder" id="moviePlaceholder">
        <div class="movie-placeholder-icon">🎬</div>
        <div class="movie-placeholder-text">点击下方按钮选择影片</div>
        <div class="movie-placeholder-sub">或输入自定义视频链接</div>
      </div>
    </div>

    <div class="movie-controls">
      <button class="movie-btn active" onclick="playVideo('steamboat', this)">🐭 蒸汽船威利(1928经典)</button>
      <button class="movie-btn" onclick="playVideo('bunny', this)">🐰 大雄兔</button>
      <button class="movie-btn" onclick="playVideo('sintel', this)">🗡️ 辛特尔</button>
      <button class="movie-btn" onclick="playVideo('eldream', this)">🐘 大象之梦</button>
      <button class="movie-btn" onclick="toggleCustomInput(this)">📁 自定义视频</button>
    </div>

    <div class="movie-custom hidden" id="customInput">
      <input type="url" id="videoUrl" placeholder="输入视频URL (mp4格式)" class="movie-input"
             onkeydown="if(event.key==='Enter')loadCustomVideo()">
      <button class="movie-btn-small" onclick="loadCustomVideo()">加载视频</button>
    </div>

    <div class="movie-error hidden" id="movieError">
      <div class="movie-error-icon">⚠️</div>
      <div class="movie-error-text" id="errorText">视频加载失败，请尝试自定义视频链接</div>
    </div>

    <div class="movie-info">
      <div class="movie-info-item">
        <div class="movie-info-label">当前播放</div>
        <div class="movie-info-value" id="currentVideo">未选择</div>
      </div>
      <div class="movie-info-item">
        <div class="movie-info-label">摸鱼时长</div>
        <div class="movie-info-value" id="watchTime">0分钟</div>
      </div>
    </div>

    <div class="movie-tips">
      <p>💡 建议佩戴耳机，假装在开会</p>
      <p>🎬 内置均为完整正片：经典动画 + 开源电影（合法免费，可放心观看）</p>
      <p>📁 想看《阿甘正传》《西游记》等版权片？用"自定义视频"粘贴网盘/B站等 mp4 直链</p>
    </div>
  </div>

  <footer class="page-footer">made with ♥ by 董家才子</footer>

  <script src="common.js"></script>
  <script>
    const videos = {
      steamboat: {
        url: 'https://archive.org/download/SteamboatWillie/Steamboat%20Willie.mp4',
        name: '蒸汽船威利 (1928 经典动画)'
      },
      bunny: {
        url: 'https://archive.org/download/BigBuckBunny_124/Content/big_buck_bunny_720p_surround.mp4',
        name: '大雄兔 Big Buck Bunny'
      },
      sintel: {
        url: 'https://archive.org/download/Sintel/sintel-2048-stereo_512kb.mp4',
        name: '辛特尔 Sintel'
      },
      eldream: {
        url: 'https://archive.org/download/ElephantsDream/ed_1024_512kb.mp4',
        name: '大象之梦 Elephants Dream'
      }
    };

    const videoPlayer = document.getElementById('videoPlayer');
    const placeholder = document.getElementById('moviePlaceholder');
    const errorPanel = document.getElementById('movieError');
    let watchStartTime = null;
    let watchTimer = null;

    function hideError() {
      errorPanel.classList.add('hidden');
    }

    function showError(msg) {
      document.getElementById('errorText').textContent = msg;
      errorPanel.classList.remove('hidden');
    }

    function setActiveBtn(btn) {
      document.querySelectorAll('.movie-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }

    function playVideo(type, btn) {
      hideError();
      setActiveBtn(btn);

      if (type === 'custom') {
        toggleCustomInput(btn);
        return;
      }

      const video = videos[type];
      if (!video) return;

      placeholder.classList.add('hidden');
      videoPlayer.src = video.url;
      videoPlayer.load();

      videoPlayer.oncanplay = () => {
        videoPlayer.play().catch(() => {});
      };

      videoPlayer.onerror = () => {
        showError('视频加载失败，该视频源可能已失效。请尝试其他影片或使用自定义链接。');
      };

      document.getElementById('currentVideo').textContent = video.name;
      startWatchTimer();
    }

    function toggleCustomInput(btn) {
      setActiveBtn(btn);
      document.getElementById('customInput').classList.toggle('hidden');
    }

    function loadCustomVideo() {
      const url = document.getElementById('videoUrl').value.trim();
      if (!url) {
        showError('请输入视频URL');
        return;
      }

      hideError();
      placeholder.classList.add('hidden');
      videoPlayer.src = url;
      videoPlayer.load();

      videoPlayer.oncanplay = () => {
        videoPlayer.play().catch(() => {});
      };

      videoPlayer.onerror = () => {
        showError('视频加载失败，请检查URL是否正确且为mp4格式。');
      };

      document.getElementById('currentVideo').textContent = '自定义视频';
      startWatchTimer();
    }

    function startWatchTimer() {
      if (watchTimer) clearInterval(watchTimer);
      watchStartTime = Date.now();

      watchTimer = setInterval(() => {
        const elapsed = Math.floor((Date.now() - watchStartTime) / 1000 / 60);
        document.getElementById('watchTime').textContent = elapsed + '分钟';
      }, 1000);
    }

    trackGamePlayed('movie');
  </script>
</body>
</html>
